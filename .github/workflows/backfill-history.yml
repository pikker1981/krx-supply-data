name: Backfill KRX History

on:
  workflow_dispatch:
    inputs:
      days:
        description: "생성할 최근 거래일 수"
        required: true
        default: "20"
      force:
        description: "기존 history 파일도 다시 생성"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: krx-history-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backfill history data
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python scripts/backfill_history.py --days "${{ github.event.inputs.days }}" --force
          else
            python scripts/backfill_history.py --days "${{ github.event.inputs.days }}"
          fi

      - name: Commit and push history data
        run: |
          git config user.name "krx-supply-bot"
          git config user.email "krx-supply-bot@users.noreply.github.com"

          git add docs/history/

          if git diff --cached --quiet; then
            echo "No history changes to commit"
          else
            git commit -m "Backfill KRX history data"
            git pull --rebase --autostash origin main
            git push
          fi
