name: Collect KRX Supply Data

on:
  schedule:
    - cron: "20 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect KRX data
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: |
          python scripts/collect.py

      - name: Commit and push data
        run: |
          git config user.name "krx-supply-bot"
          git config user.email "krx-supply-bot@users.noreply.github.com"

          git add docs/latest.json docs/history/
          git commit -m "Update KRX supply data" || echo "No changes to commit"

          git pull --rebase origin main
          git push origin main
