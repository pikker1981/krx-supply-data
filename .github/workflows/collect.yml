name: Collect KRX Supply Data

on:
  schedule:
    # KST 매일 09:00 ~ 20:50, 10분 간격 (UTC 00:00 ~ 11:50)
    - cron: "*/10 0-11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: krx-supply-data
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect KRX data
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python scripts/collect.py

      - name: Commit and push data
        run: |
          git config user.name "krx-supply-bot"
          git config user.email "krx-supply-bot@users.noreply.github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update KRX supply data"
            git pull --rebase --autostash origin main
            git push
          fi
